<div class="view-layout max-w-4xl mx-auto">
  <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
    <div class="stat-card matte-surface">
      <div class="stat-icon">
        <mat-icon class="text-info">apps</mat-icon>
      </div>
      <div class="stat-content">
        <span class="stat-label">Total Items</span>
        <span class="stat-value">{{ totalItems() }}</span>
      </div>
    </div>

    <div class="stat-card matte-surface">
      <div class="stat-icon" style="background: linear-gradient(135deg, #22c55e, #10b981)">
        <mat-icon class="text-white">check_circle</mat-icon>
      </div>
      <div class="stat-content">
        <span class="stat-label">Enabled</span>
        <span class="stat-value">{{ enabledItems() }}</span>
      </div>
    </div>

    <div class="stat-card matte-surface">
      <div class="stat-icon" style="background: linear-gradient(135deg, #ef4444, #dc2626)">
        <mat-icon class="text-white">cancel</mat-icon>
      </div>
      <div class="stat-content">
        <span class="stat-label">Disabled</span>
        <span class="stat-value">{{ disabledItems() }}</span>
      </div>
    </div>
  </div>

  <div class="glass-card matte-surface">
    <div class="glass-card-body">
      <app-data-list
        [columns]="columns"
        [data]="startupData()"
        [options]="options"
        [loading]="loading()"
        [pageSize]="pageSize()"
        [currentPage]="currentPage()"
        (pageChange)="onPageChange($event)"
        (newPageSize)="onPageSizeChange($event)"
        (rowAction)="onRowAction($event)"
        (reload)="onReload()"
      />
    </div>
  </div>
</div>
