<div class="view-layout max-w-4xl mx-auto">
  <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
    <div class="stat-card matte-surface border-trace flex items-center gap-4">
      <div class="w-14 h-14 rounded-xl bg-info/10 flex items-center justify-center">
        <mat-icon class="text-info icon-xl" fontIcon="settings" />
      </div>
      <div>
        <p class="text-xs font-bold text-zinc-500 dark:text-zinc-400 uppercase tracking-wider">
          Total Services
        </p>
        <p class="text-3xl font-bold text-zinc-900 dark:text-white">{{ totalServices() }}</p>
      </div>
    </div>

    <div class="stat-card matte-surface border-trace flex items-center gap-4">
      <div class="w-14 h-14 rounded-xl bg-success/10 flex items-center justify-center">
        <mat-icon class="text-success icon-xl" fontIcon="play_arrow" />
      </div>
      <div>
        <p class="text-xs font-bold text-zinc-500 dark:text-zinc-400 uppercase tracking-wider">
          Active
        </p>
        <p class="text-3xl font-bold text-zinc-900 dark:text-white">{{ runningServices() }}</p>
      </div>
    </div>

    <div class="stat-card matte-surface border-trace flex items-center gap-4">
      <div class="w-14 h-14 rounded-xl bg-error/10 flex items-center justify-center">
        <mat-icon class="text-error icon-xl" fontIcon="stop" />
      </div>
      <div>
        <p class="text-xs font-bold text-zinc-500 dark:text-zinc-400 uppercase tracking-wider">
          Inactive
        </p>
        <p class="text-3xl font-bold text-zinc-900 dark:text-white">{{ stoppedServices() }}</p>
      </div>
    </div>
  </div>

  <div class="glass-card matte-surface border-trace flex flex-col min-h-[400px]">
    <div class="glass-card-header">
      <div class="flex gap-2">
        <button
          (click)="stopSelectedServices()"
          [disabled]="selectedServices().size === 0"
          class="btn btn-danger"
        >
          <mat-icon class="icon-sm" fontIcon="stop" />
          Stop Selected
        </button>
        <button
          (click)="startSelectedServices()"
          [disabled]="selectedServices().size === 0"
          class="btn btn-primary"
        >
          <mat-icon class="icon-sm" fontIcon="play_arrow" />
          Start Selected
        </button>
      </div>
    </div>
    <div class="glass-card-body flex-1 overflow-hidden">
      <app-data-list
        [columns]="columns"
        [data]="servicesData()"
        [options]="options"
        [loading]="loading()"
        [selectedKeys]="selectedServices()"
        (selectionChange)="onSelectionChange($event)"
        (rowAction)="onRowAction($event)"
      />
    </div>
  </div>
</div>
