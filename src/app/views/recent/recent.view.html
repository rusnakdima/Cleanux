<div class="view-layout max-w-4xl mx-auto">
  <div class="view-header">
    <h1>Recent Files</h1>
    <p>Clean recent file history</p>
  </div>

  <div class="glass-surface matte-surface p-6 mb-6">
    <div class="flex items-center justify-between">
      <div>
        <p class="text-xs text-[var(--text-muted)] uppercase tracking-wider">Tracked Items</p>
        <p class="text-2xl font-bold">{{ items().length }}</p>
      </div>
      <button (click)="clearAll()" [disabled]="items().length === 0" class="btn btn-danger">
        <mat-icon class="icon-sm">delete_sweep</mat-icon>
        Clear All History
      </button>
    </div>
  </div>

  <div class="glass-surface matte-surface overflow-hidden">
    @if (items().length > 0) {
      <app-data-list
        [columns]="columns"
        [data]="items()"
        [options]="options"
        [pageSize]="pageSize()"
        [currentPage]="currentPage()"
        (pageChange)="onPageChange($event)"
        (newPageSize)="onPageSizeChange($event)"
        (rowAction)="onRowAction($event)"
      />
    } @else {
      <div class="p-8 text-center">
        <mat-icon class="icon-xl text-[var(--text-muted)] mb-4">history</mat-icon>
        <p class="text-[var(--text-secondary)]">No recent files tracked</p>
        <p class="text-sm text-[var(--text-muted)] mt-1">Recent file activity will appear here</p>
      </div>
    }
  </div>

  <div class="glass-surface matte-surface p-5 mt-6">
    <h3 class="section-title mb-4">Apps with Recent History</h3>
    <div class="grid grid-cols-2 sm:grid-cols-4 gap-3">
      @for (app of apps; track app.id; let i = $index) {
        <button
          (click)="clearApp(app.id)"
          class="category-card matte-surface {{ i % 2 === 0 ? 'border-gray-light' : 'border-gray-dark' }} flex flex-col items-center justify-center p-4 no-underline"
        >
          <mat-icon class="icon-lg text-[var(--text-muted)] mb-2">{{ app.icon }}</mat-icon>
          <span class="text-xs">{{ app.name }}</span>
        </button>
      }
    </div>
  </div>
</div>
