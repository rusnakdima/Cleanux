<div class="view-layout max-w-4xl mx-auto">
  <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
    <div class="stat-card matte-surface border-trace">
      <div class="stat-icon" [style.background]="getAccentGradient()">
        <mat-icon class="text-white dark:text-zinc-900" fontIcon="file_copy" />
      </div>
      <div class="stat-content">
        <span class="stat-label">Large Files Found</span>
        <span class="stat-value">{{ largeFiles().length }}</span>
      </div>
    </div>

    <div class="stat-card matte-surface border-trace">
      <div class="stat-icon" [style.background]="getAccentGradient()">
        <mat-icon class="text-white dark:text-zinc-900" fontIcon="storage" />
      </div>
      <div class="stat-content">
        <span class="stat-label">Total Space</span>
        <span class="stat-value">{{ formatSize(totalSize()) }}</span>
      </div>
    </div>
  </div>

  <div class="glass-card matte-surface border-trace">
    <div class="glass-card-header">
      <button
        (click)="clearSelectedFiles()"
        [disabled]="selectedFiles().size === 0"
        class="btn btn-danger"
      >
        <mat-icon class="icon-sm" fontIcon="delete" />
        Delete Selected
      </button>
    </div>
    <div class="glass-card-body">
      <app-data-list
        [columns]="columns"
        [data]="largeFiles()"
        [options]="options"
        [loading]="loading()"
        [selectedKeys]="selectedFiles()"
        (selectionChange)="onSelectionChange($event)"
        (rowAction)="onRowAction($event)"
      />
    </div>
  </div>
</div>

@if (previewData()) {
  <app-file-preview
    [fileData]="previewData()"
    (close)="onClosePreview()"
    (openInEditor)="onOpenInEditor($event)"
  />
}
