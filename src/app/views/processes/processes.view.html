<div class="view-layout max-w-4xl mx-auto">
  <div class="flex items-center justify-between mb-6">
    <div>
      <h1 class="text-2xl font-bold text-[var(--text-primary)]">Processes</h1>
      <p class="text-sm text-[var(--text-muted)] mt-1">View and manage running processes</p>
    </div>
    <div class="flex gap-2">
      <button (click)="flushRamCaches()" class="btn btn-secondary">
        <mat-icon class="icon-sm">memory</mat-icon>
        Flush RAM
      </button>
    </div>
  </div>

  <div class="glass-card matte-surface">
    <div class="glass-card-header">
      <span class="text-sm font-medium text-[var(--text-secondary)]">
        Total: {{ totalProcesses() }} processes
      </span>
      <button
        (click)="killSelectedProcesses()"
        [disabled]="selectedPids().size === 0"
        class="btn btn-danger"
      >
        <mat-icon class="icon-sm">stop</mat-icon>
        Kill Selected
      </button>
    </div>

    <div class="glass-card-body">
      <app-data-list
        [columns]="columns"
        [data]="processesData()"
        [options]="options"
        [loading]="loading()"
        [currentPage]="currentPage()"
        [pageSize]="pageSize()"
        [pageSizeOptions]="[10, 15, 25, 50, 100]"
        [showPageSizeSelector]="true"
        (pageChange)="onPageChange($event)"
        (newPageSize)="onPageSizeChange($event)"
        (selectionChange)="onSelectionChange($event)"
        (rowAction)="onRowAction($event)"
        (reload)="loadData()"
      />
    </div>
  </div>
</div>
