<div class="view-layout max-w-4xl mx-auto">
  <div class="view-header">
    <h1>Clipboard</h1>
    <p>Manage clipboard history</p>
  </div>

  <div class="glass-surface matte-surface border-trace p-6 mb-6">
    <div class="flex items-center justify-between">
      <div>
        <p class="text-xs text-[var(--text-muted)] uppercase tracking-wider">Clipboard History</p>
        <p class="text-2xl font-bold">{{ items().length }} items</p>
      </div>
      <button (click)="clearUnpinned()" class="btn btn-danger">
        <mat-icon class="icon-sm">delete_sweep</mat-icon>
        Clear Unpinned
      </button>
    </div>
  </div>

  <div class="glass-surface matte-surface border-trace overflow-hidden">
    <app-data-list
      [columns]="columns"
      [data]="items()"
      [options]="options"
      [pageSize]="pageSize()"
      [currentPage]="currentPage()"
      (pageChange)="onPageChange($event)"
      (newPageSize)="onPageSizeChange($event)"
      (rowAction)="onRowAction($event)"
    />
  </div>

  @if (items().length === 0) {
    <div class="glass-surface matte-surface border-trace p-8 text-center">
      <mat-icon class="icon-xl text-[var(--text-muted)] mb-4">content_paste</mat-icon>
      <p class="text-[var(--text-secondary)]">Clipboard is empty</p>
      <p class="text-sm text-[var(--text-muted)] mt-1">Copied text and images will appear here</p>
    </div>
  }

  <div class="glass-surface p-5 mt-6">
    <h3 class="section-title mb-4">Clipboard Settings</h3>
    <label class="flex items-center justify-between cursor-pointer">
      <span class="text-sm">Enable clipboard history</span>
      <input
        type="checkbox"
        [(ngModel)]="historyEnabled"
        class="accent-[var(--accent-icons)] w-5 h-5"
      />
    </label>
  </div>
</div>
