<div class="view-layout max-w-4xl mx-auto">
  <div class="flex items-center justify-between mb-6">
    <div>
      <h2 class="text-xl font-bold text-[var(--text-primary)]">Backup Management</h2>
      <p class="text-sm text-[var(--text-muted)] mt-1">
        Create and restore backups before cleaning operations
      </p>
    </div>
    <button (click)="loadBackups()" class="btn btn-primary">
      <mat-icon class="icon-sm">refresh</mat-icon>
      Refresh
    </button>
  </div>

  @if (loading()) {
    <div class="flex items-center justify-center py-12">
      <mat-progress-spinner mode="indeterminate" diameter="48"></mat-progress-spinner>
    </div>
  } @else if (backups().length === 0) {
    <div class="glass-surface matte-surface border-trace p-12 text-center">
      <mat-icon class="icon-4xl text-[var(--text-muted)] mb-4">backup</mat-icon>
      <h3 class="text-lg font-semibold text-[var(--text-secondary)]">No Backups Found</h3>
      <p class="text-sm text-[var(--text-muted)] mt-2">
        Backups created before cleaning operations will appear here
      </p>
    </div>
  } @else {
    <div class="glass-card matte-surface border-trace">
      <div class="glass-card-header">
        <h3 class="text-sm font-semibold text-[var(--text-secondary)]">
          {{ backups().length }} backup(s)
        </h3>
      </div>
      <div class="glass-card-body px-4 pb-4">
        <app-data-table
          [columns]="columns"
          [data]="backups()"
          [loading]="loading()"
          [options]="getTableOptions()"
          [currentPage]="currentPage()"
          [pageSize]="pageSize()"
          [pageSizeOptions]="[10, 15, 25, 50, 100]"
          [showPageSizeSelector]="true"
          (pageChange)="onPageChange($event)"
          (newPageSize)="onPageSizeChange($event)"
          (rowAction)="onRestore($event)"
        />
      </div>
    </div>
  }
</div>
