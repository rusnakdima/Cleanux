<div class="view-layout max-w-4xl mx-auto">
  @if (loading()) {
    <app-loading-spinner size="lg" />
  } @else {
    <div class="mb-4 flex items-center justify-between">
      <div>
        <p class="text-lg text-zinc-400 dark:text-zinc-500">
          Total cache size: <span class="font-semibold">{{ getTotalSize() }}</span>
        </p>
      </div>
      <button class="btn btn-primary" (click)="cleanAll()" [disabled]="cleaning()">
        <mat-icon fontIcon="delete_sweep" />
        Clean All
      </button>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
      @for (tool of devTools(); track trackByName($index, tool)) {
        <div class="glass-card matte-surface p-4">
          <div class="flex items-center justify-between mb-3">
            <div class="flex items-center gap-3">
              <div class="w-12 h-12 rounded-lg bg-info/10 flex items-center justify-center">
                <mat-icon class="text-info" [fontIcon]="tool.icon" />
              </div>
              <div>
                <h3 class="font-semibold text-lg">{{ tool.displayName }}</h3>
                <p class="text-sm text-zinc-500 dark:text-zinc-400">
                  {{ tool.item?.description || "Cache" }}
                </p>
              </div>
            </div>
          </div>

          <div class="flex items-center justify-between">
            <div>
              <p class="text-2xl font-bold text-zinc-900 dark:text-white">
                {{ getToolSize(tool.item) }}
              </p>
              @if (tool.item?.cache_path) {
                <p
                  class="text-xs text-zinc-500 dark:text-zinc-400 truncate max-w-[180px]"
                  [matTooltip]="tool.item?.cache_path"
                >
                  {{ tool.item?.cache_path }}
                </p>
              }
            </div>
            <button class="btn btn-danger" (click)="cleanTool(tool.name)" [disabled]="cleaning()">
              <mat-icon fontIcon="cleaning_services" />
              Clean
            </button>
          </div>
        </div>
      }
    </div>
  }
</div>
