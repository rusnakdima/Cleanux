<div class="fixed inset-0 z-[9999] bg-black/60 backdrop-blur-sm flex items-center justify-center animate-[fadeIn_0.15s_ease-out]" (click)="onBackdropClick($event)">
  <div
    class="relative bg-zinc-100 dark:bg-zinc-700 border border-zinc-200 dark:border-zinc-700 rounded-xl min-w-[360px] max-w-[480px] p-5 shadow-[0_20px_40px_rgba(0,0,0,0.4)] animate-[slideIn_0.2s_ease-out]"
    [class.border-red-500]="config.dangerous"
    [class.dark:border-red-500]="config.dangerous"
    [class.shadow-[0_0_20px_rgba(239,68,68,0.2)]]="config.dangerous"
    (click)="$event.stopPropagation()"
  >
    <div class="flex items-center gap-3 mb-4">
      @if (config.dangerous) {
        <svg class="w-6 h-6 text-red-500 flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
          <line x1="12" y1="9" x2="12" y2="13"/>
          <line x1="12" y1="17" x2="12.01" y2="17"/>
        </svg>
      }
      <h2 class="flex-1 text-lg font-semibold text-zinc-900 dark:text-white m-0">{{ config.title }}</h2>
      <button class="bg-none border-none p-1 cursor-pointer text-zinc-500 dark:text-zinc-400 transition-colors hover:text-zinc-900 dark:hover:text-white" (click)="onCancel()" aria-label="Close">
        <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>

    <div class="mb-5">
      <p class="text-zinc-400 dark:text-zinc-500 text-sm leading-relaxed m-0">{{ config.message }}</p>

      @if (config.showCheckbox) {
        <label class="flex items-center gap-2.5 mt-4 cursor-pointer text-zinc-400 dark:text-zinc-500 text-sm">
          <input type="checkbox" [checked]="checkboxChecked()" (change)="checkboxChecked.set(!checkboxChecked())" class="w-4 h-4 accent-cyan-500 dark:accent-cyan-400" />
          <span>{{ config.checkboxLabel }}</span>
        </label>
      }

      @if (config.requireYesToConfirm) {
        <div class="mt-4">
          <label class="block text-zinc-400 dark:text-zinc-500 text-sm mb-2">Type <strong class="text-red-500">YES</strong> to confirm:</label>
          <input
            type="text"
            class="w-full px-3 py-2.5 bg-zinc-50 dark:bg-zinc-800 border border-zinc-200 dark:border-zinc-700 rounded-lg text-zinc-900 dark:text-white text-sm font-normal uppercase tracking-wider focus:outline-none focus:border-red-500 focus:ring-2 focus:ring-red-500/20"
            [value]="yesInput()"
            (input)="yesInput.set($any($event.target).value)"
            placeholder="YES"
            autocomplete="off"
          />
        </div>
      }
    </div>

    <div class="flex justify-end gap-3">
      <button class="px-5 py-2.5 rounded-lg text-sm font-medium cursor-pointer transition-all border bg-zinc-50 dark:bg-zinc-800 text-zinc-400 dark:text-zinc-500 border-zinc-200 dark:border-zinc-700 hover:bg-zinc-100 dark:hover:bg-zinc-700 hover:text-zinc-900 dark:hover:text-white" (click)="onCancel()">
        {{ config.cancelText }}
      </button>
      <button
        class="px-5 py-2.5 rounded-lg text-sm font-medium cursor-pointer transition-all border"
        [ngClass]="getConfirmBtnClass()"
        [disabled]="!canConfirm()"
        (click)="onConfirm()"
      >
        {{ config.confirmText }}
      </button>
    </div>
  </div>
</div>

<style>
  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  @keyframes slideIn {
    from {
      opacity: 0;
      transform: translateY(-10px) scale(0.98);
    }
    to {
      opacity: 1;
      transform: translateY(0) scale(1);
    }
  }
</style>
