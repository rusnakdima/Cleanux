<div class="dialog-overlay" (click)="onBackdropClick($event)">
  <div class="dialog-container" [class.dangerous]="config.dangerous" (click)="$event.stopPropagation()">
    <div class="dialog-header">
      @if (config.dangerous) {
        <svg class="warning-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
          <line x1="12" y1="9" x2="12" y2="13"/>
          <line x1="12" y1="17" x2="12.01" y2="17"/>
        </svg>
      }
      <h2 class="dialog-title">{{ config.title }}</h2>
      <button class="close-btn" (click)="onCancel()" aria-label="Close">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>

    <div class="dialog-content">
      <p class="dialog-message">{{ config.message }}</p>

      @if (config.showCheckbox) {
        <label class="checkbox-label">
          <input type="checkbox" [checked]="checkboxChecked()" (change)="checkboxChecked.set(!checkboxChecked())" />
          <span>{{ config.checkboxLabel }}</span>
        </label>
      }

      @if (config.requireYesToConfirm) {
        <div class="yes-input-container">
          <label class="yes-label">Type <strong>YES</strong> to confirm:</label>
          <input
            type="text"
            class="yes-input"
            [value]="yesInput()"
            (input)="yesInput.set($any($event.target).value)"
            placeholder="YES"
            autocomplete="off"
          />
        </div>
      }
    </div>

    <div class="dialog-actions">
      <button class="btn btn-cancel" (click)="onCancel()">
        {{ config.cancelText }}
      </button>
      <button
        class="btn"
        [class.btn-primary]="config.confirmColor === 'primary' || !config.confirmColor"
        [class.btn-accent]="config.confirmColor === 'accent'"
        [class.btn-warn]="config.confirmColor === 'warn'"
        [disabled]="!canConfirm()"
        (click)="onConfirm()"
      >
        {{ config.confirmText }}
      </button>
    </div>
  </div>
</div>
