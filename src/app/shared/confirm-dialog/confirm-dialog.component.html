<div class="fixed inset-0 z-[9999] bg-black/60 backdrop-blur-sm flex items-center justify-center animate-[fadeIn_0.15s_ease-out]" (click)="onBackdropClick($event)">
  <div
    class="relative bg-[var(--bg-elevated)] border border-[var(--border-color)] rounded-xl min-w-[360px] max-w-[480px] p-5 shadow-[0_20px_40px_rgba(0,0,0,0.4)] animate-[slideIn_0.2s_ease-out]"
    [class.border-[var(--color-error)]]="config.dangerous"
    [class.shadow-[0_0_20px_rgba(239,68,68,0.2)]]="config.dangerous"
    (click)="$event.stopPropagation()"
  >
    <div class="flex items-center gap-3 mb-4">
      @if (config.dangerous) {
        <svg class="w-6 h-6 text-[var(--color-error)] flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
          <line x1="12" y1="9" x2="12" y2="13"/>
          <line x1="12" y1="17" x2="12.01" y2="17"/>
        </svg>
      }
      <h2 class="flex-1 text-lg font-semibold text-[var(--text-primary)] m-0">{{ config.title }}</h2>
      <button class="bg-none border-none p-1 cursor-pointer text-[var(--text-muted)] transition-colors hover:text-[var(--text-primary)]" (click)="onCancel()" aria-label="Close">
        <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>

    <div class="mb-5">
      <p class="text-[var(--text-secondary)] text-sm leading-relaxed m-0">{{ config.message }}</p>

      @if (config.showCheckbox) {
        <label class="flex items-center gap-2.5 mt-4 cursor-pointer text-[var(--text-secondary)] text-sm">
          <input type="checkbox" [checked]="checkboxChecked()" (change)="checkboxChecked.set(!checkboxChecked())" class="w-4 h-4 accent-[var(--accent-primary)]" />
          <span>{{ config.checkboxLabel }}</span>
        </label>
      }

      @if (config.requireYesToConfirm) {
        <div class="mt-4">
          <label class="block text-[var(--text-secondary)] text-sm mb-2">Type <strong class="text-[var(--color-error)]">YES</strong> to confirm:</label>
          <input
            type="text"
            class="w-full px-3 py-2.5 bg-[var(--bg-surface)] border border-[var(--border-color)] rounded-lg text-[var(--text-primary)] text-sm font-normal uppercase tracking-wider focus:outline-none focus:border-[var(--color-error)] focus:ring-2 focus:ring-[rgba(239,68,68,0.2)]"
            [value]="yesInput()"
            (input)="yesInput.set($any($event.target).value)"
            placeholder="YES"
            autocomplete="off"
          />
        </div>
      }
    </div>

    <div class="flex justify-end gap-3">
      <button class="px-5 py-2.5 rounded-lg text-sm font-medium cursor-pointer transition-all border" [ngClass]="getCancelBtnClass()" (click)="onCancel()">
        {{ config.cancelText }}
      </button>
      <button
        class="px-5 py-2.5 rounded-lg text-sm font-medium cursor-pointer transition-all border"
        [ngClass]="getConfirmBtnClass()"
        [disabled]="!canConfirm()"
        (click)="onConfirm()"
      >
        {{ config.confirmText }}
      </button>
    </div>
  </div>
</div>

<style>
  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  @keyframes slideIn {
    from {
      opacity: 0;
      transform: translateY(-10px) scale(0.98);
    }
    to {
      opacity: 1;
      transform: translateY(0) scale(1);
    }
  }

  .btn-cancel {
    background: var(--bg-surface);
    color: var(--text-secondary);
    border-color: var(--border-color);
  }

  .btn-cancel:hover {
    background: var(--bg-elevated);
    color: var(--text-primary);
  }

  .btn-primary {
    background: var(--accent-primary);
    color: #fff;
    border-color: transparent;
  }

  .btn-primary:hover:not(:disabled) {
    background: color-mix(in srgb, var(--accent-primary) 85%, white);
  }

  .btn-accent {
    background: var(--accent-secondary);
    color: #fff;
    border-color: transparent;
  }

  .btn-accent:hover:not(:disabled) {
    background: color-mix(in srgb, var(--accent-secondary) 85%, white);
  }

  .btn-warn {
    background: var(--color-error);
    color: #fff;
    border-color: transparent;
  }

  .btn-warn:hover:not(:disabled) {
    background: color-mix(in srgb, var(--color-error) 85%, white);
  }

  .btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }
</style>
