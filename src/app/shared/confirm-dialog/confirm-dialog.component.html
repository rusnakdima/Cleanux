<div
  class="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-[9999] animate-fade-in"
  (click)="onBackdropClick($event)"
>
  <div
    class="bg-[var(--bg-elevated)] border border-[var(--border-color)] rounded-xl min-w-[360px] max-w-[480px] p-5 shadow-2xl animate-slide-in"
    [class.border-[var(--color-error)]]="config.dangerous"
    [class.shadow-[0_0_20px_rgba(239,68,68,0.2)]]="config.dangerous"
    (click)="$event.stopPropagation()"
  >
    <div class="flex items-center gap-3 mb-4">
      @if (config.dangerous) {
        <svg
          class="w-6 h-6 text-[var(--color-error)] flex-shrink-0"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <path
            d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"
          />
          <line x1="12" y1="9" x2="12" y2="13" />
          <line x1="12" y1="17" x2="12.01" y2="17" />
        </svg>
      }
      <h2 class="flex-1 text-lg font-semibold text-[var(--text-primary)] m-0">
        {{ config.title }}
      </h2>
      <button
        class="bg-transparent border-none p-1 cursor-pointer text-[var(--text-muted)] hover:text-[var(--text-primary)] transition-colors"
        (click)="onCancel()"
        aria-label="Close"
      >
        <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18" />
          <line x1="6" y1="6" x2="18" y2="18" />
        </svg>
      </button>
    </div>

    <div class="mb-5">
      <p class="text-[var(--text-secondary)] text-sm leading-relaxed m-0">{{ config.message }}</p>

      @if (config.showCheckbox) {
        <label
          class="flex items-center gap-[10px] mt-4 cursor-pointer text-[var(--text-secondary)] text-sm"
        >
          <input
            type="checkbox"
            class="w-[18px] h-[18px] accent-[var(--accent-primary)]"
            [checked]="checkboxChecked()"
            (change)="checkboxChecked.set(!checkboxChecked())"
          />
          <span>{{ config.checkboxLabel }}</span>
        </label>
      }

      @if (config.requireYesToConfirm) {
        <div class="mt-4">
          <label class="block text-[var(--text-secondary)] text-sm mb-2"
            >Type <strong class="text-[var(--color-error)]">YES</strong> to confirm:</label
          >
          <input
            type="text"
            class="w-full px-3 py-[10px] bg-[var(--bg-surface)] border border-[var(--border-color)] rounded-lg text-[var(--text-primary)] text-sm uppercase tracking-wider focus:outline-none focus:border-[var(--color-error)] focus:shadow-[0_0_0_2px_rgba(239,68,68,0.2)]"
            [value]="yesInput()"
            (input)="yesInput.set($event.target.value)"
            placeholder="YES"
            autocomplete="off"
          />
        </div>
      }
    </div>

    <div class="flex justify-end gap-3">
      <button
        class="px-5 py-2 rounded-lg text-sm font-medium cursor-pointer transition-all bg-[var(--bg-surface)] text-[var(--text-muted)] border border-[var(--border-color)] hover:bg-[var(--bg-elevated)] hover:text-[var(--text-primary)]"
        (click)="onCancel()"
      >
        {{ config.cancelText }}
      </button>
      <button
        class="px-5 py-2 rounded-lg text-sm font-medium cursor-pointer transition-all border-none"
        [class]="
          config.confirmColor === 'primary' || !config.confirmColor
            ? 'bg-[var(--accent-primary)] text-white hover:opacity-90'
            : config.confirmColor === 'accent'
              ? 'bg-[var(--accent-secondary)] text-white hover:opacity-90'
              : 'bg-[var(--color-error)] text-white hover:opacity-90'
        "
        [disabled]="!canConfirm()"
        (click)="onConfirm()"
      >
        {{ config.confirmText }}
      </button>
    </div>
  </div>
</div>
