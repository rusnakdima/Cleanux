<div
  class="flex items-center justify-between gap-4 px-4 pt-3 pb-[22px] mb-2 w-full border-t border-[var(--border-color)] bg-[var(--bg-surface)]/80 backdrop-blur-lg"
>
  <div class="flex items-center gap-4">
    <div class="text-sm font-medium text-[var(--text-secondary)] whitespace-nowrap">
      Showing {{ (p() - 1) * pageSize() + 1 }}-{{
        p() * pageSize() > totalItems() ? totalItems() : p() * pageSize()
      }}
      of {{ totalItems() }}
    </div>

    @if (showPageSizeSelector()) {
      <select
        [value]="pageSize()"
        (change)="onPageSizeChange($any($event.target).value)"
        class="h-8 px-2 text-sm rounded-lg border border-[var(--border-color)] bg-[var(--bg-surface)] text-[var(--text-primary)] focus:outline-none focus:ring-2 focus:ring-[var(--accent-primary)]/50 cursor-pointer"
      >
        @for (size of pageSizeOptions(); track size) {
          <option [value]="size">{{ size }} per page</option>
        }
      </select>
    }
  </div>

  @if (totalPages() > 0) {
    <div class="flex items-center gap-1">
      <button
        mat-icon-button
        (click)="goToPage(1)"
        [disabled]="p() === 1"
        class="!w-6 !h-6 !min-w-6 !rounded-lg text-[var(--text-secondary)] hover:bg-[var(--bg-hover)] transition-colors disabled:opacity-40 disabled:cursor-not-allowed"
        matTooltip="First page"
      >
        <mat-icon class="text-xl">first_page</mat-icon>
      </button>

      <button
        mat-icon-button
        (click)="previousPage()"
        [disabled]="p() === 1"
        class="!w-6 !h-6 !min-w-6 !rounded-lg text-[var(--text-secondary)] hover:bg-[var(--bg-hover)] transition-colors disabled:opacity-40 disabled:cursor-not-allowed"
        matTooltip="Previous page"
      >
        <mat-icon class="text-xl">chevron_left</mat-icon>
      </button>

      <div class="flex items-center gap-1 mx-1">
        @for (page of pages(); track $index) {
          @if (page === "...") {
            <span class="w-6 h-6 flex items-center justify-center text-[var(--text-muted)]"
              >...</span
            >
          } @else {
            <button
              (click)="goToPage(page)"
              class="w-6 h-6 flex items-center justify-center rounded-lg text-sm font-medium transition-all duration-200"
              [class.bg-[var(--accent-primary)]]="p() === page"
              [class.text-white]="p() === page"
              [class.text-[var(--text-secondary)]]="p() !== page"
              [class.hover:bg-[var(--bg-hover)]]="p() !== page"
              [attr.aria-current]="p() === page ? 'page' : null"
            >
              {{ page }}
            </button>
          }
        }
      </div>

      <button
        mat-icon-button
        (click)="nextPage()"
        [disabled]="p() === totalPages()"
        class="!w-6 !h-6 !min-w-6 !rounded-lg text-[var(--text-secondary)] hover:bg-[var(--bg-hover)] transition-colors disabled:opacity-40 disabled:cursor-not-allowed"
        matTooltip="Next page"
      >
        <mat-icon class="text-xl">chevron_right</mat-icon>
      </button>

      <button
        mat-icon-button
        (click)="goToPage(totalPages())"
        [disabled]="p() === totalPages()"
        class="!w-6 !h-6 !min-w-6 !rounded-lg text-[var(--text-secondary)] hover:bg-[var(--bg-hover)] transition-colors disabled:opacity-40 disabled:cursor-not-allowed"
        matTooltip="Last page"
      >
        <mat-icon class="text-xl">last_page</mat-icon>
      </button>
    </div>
  }
</div>
