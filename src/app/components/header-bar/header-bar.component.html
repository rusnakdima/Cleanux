<header class="header-bar">
  <div class="mx-auto flex w-full max-w-7xl items-center justify-between px-4 py-3">
    <div class="flex min-w-0 items-center gap-3">
      @if (showBack()) {
        <button
          class="flex h-9 flex-shrink-0 items-center justify-center rounded-full border border-white/20 bg-transparent px-3 py-2 shadow-lg shadow-black/10 backdrop-blur-sm transition-all hover:bg-white/20 dark:border-white/20 dark:hover:bg-white/10 light:border-zinc-300 light:hover:bg-zinc-200/50"
          (click)="backClick.emit()"
        >
          <mat-icon class="text-base text-white dark:text-zinc-900">chevron_left</mat-icon>
        </button>
      }

      <div class="flex min-w-0 flex-1 flex-col">
        <div
          class="flex items-center gap-2 rounded-full border border-white/20 bg-transparent px-4 py-2 shadow-lg shadow-black/10 backdrop-blur-sm dark:border-white/20 light:border-zinc-300 light:shadow-zinc-200/20"
        >
          <h1 class="header-title text-normal truncate text-lg font-semibold text-white dark:text-zinc-900">{{ title() }}</h1>
        </div>
      </div>
    </div>
  </div>
</header>
