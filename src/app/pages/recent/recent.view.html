<div class="view-layout max-w-4xl mx-auto">
  <div class="view-header">
    <h1>Recent Files</h1>
    <p>Clean recent file history</p>
  </div>

  <div class="glass-card matte-surface p-6 mb-6">
    <div class="flex items-center justify-between">
      <div>
        <p class="text-xs text-zinc-500 dark:text-zinc-400 uppercase tracking-wider">
          Tracked Items
        </p>
        <p class="text-2xl font-bold">{{ items().length }}</p>
      </div>
      <button (click)="clearAll()" [disabled]="items().length === 0" class="btn btn-danger">
        <mat-icon class="icon-sm" fontIcon="delete_sweep" />
        Clear All History
      </button>
    </div>
  </div>

  <div class="glass-card matte-surface overflow-hidden">
    @if (items().length > 0) {
      <app-data-list
        [columns]="columns"
        [data]="items()"
        [options]="options"
        [pageSize]="pageSize()"
        [currentPage]="currentPage()"
        (pageChange)="onPageChange($event)"
        (newPageSize)="onPageSizeChange($event)"
        (rowAction)="onRowAction($event)"
      />
    } @else {
      <div class="p-8 text-center">
        <mat-icon class="icon-xl text-zinc-500 dark:text-zinc-400 mb-4" fontIcon="history" />
        <p class="text-zinc-900 dark:text-white">No recent files tracked</p>
        <p class="text-sm text-zinc-500 dark:text-zinc-400 mt-1">
          Recent file activity will appear here
        </p>
      </div>
    }
  </div>

  <div class="glass-card matte-surface p-5 mt-6">
    <h3 class="section-title mb-4">Apps with Recent History</h3>
    <div class="grid grid-cols-2 sm:grid-cols-4 gap-3">
      @for (app of apps; track app.id; let i = $index) {
        <button
          (click)="clearApp(app.id)"
          class="category-card matte-surface border-trace flex flex-col items-center justify-center p-4 no-underline"
        >
          <mat-icon class="icon-lg text-zinc-500 dark:text-zinc-400 mb-2" [fontIcon]="app.icon" />
          <span class="text-xs">{{ app.name }}</span>
        </button>
      }
    </div>
  </div>
</div>
