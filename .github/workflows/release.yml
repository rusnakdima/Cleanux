name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      platform:
        description: "Platform to build"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - linux
          - windows
          - macos

jobs:
  release:
    name: Build Release
    runs-on: ${{ matrix.platform == 'macos' && 'macos-latest' || matrix.platform == 'windows' && 'windows-latest' || 'ubuntu-latest' }}
    permissions:
      contents: write
    strategy:
      matrix:
        platform: [linux, windows, macos]
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.0-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'windows' && 'x86_64-pc-windows-msvc' || matrix.platform == 'macos' && 'aarch64-apple-darwin,x86_64-apple-darwin' || 'x86_64-unknown-linux-gnu' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: bun install

      - name: Build Linux
        if: matrix.platform == 'linux'
        run: bun run tauri:build --target x86_64-unknown-linux-gnu

      - name: Build Windows
        if: matrix.platform == 'windows'
        run: bun run tauri:build --target x86_64-pc-windows-msvc

      - name: Build macOS
        if: matrix.platform == 'macos'
        run: |
          bun run tauri:build --target aarch64-apple-darwin
          bun run tauri:build --target x86_64-apple-darwin

      - name: Create draft release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            ${{ matrix.platform == 'linux' && 'src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb' || '' }}
            ${{ matrix.platform == 'linux' && 'src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage' || '' }}
            ${{ matrix.platform == 'linux' && 'src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/rpm/*.rpm' || '' }}
            ${{ matrix.platform == 'windows' && 'src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe' || '' }}
            ${{ matrix.platform == 'windows' && 'src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi' || '' }}
            ${{ matrix.platform == 'macos' && 'src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg' || '' }}
            ${{ matrix.platform == 'macos' && 'src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg' || '' }}
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
